<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holland Code — Career Personality Assessment</title>
    <style>
        /* [Merged CSS from style.css] */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root {
            --primary: #1A73E8; --primary-dark: #1557B0; --primary-light: #E8F0FE;
            --bg: #F5F7FA; --surface: #FFFFFF; --ink: #0F172A; --ink-soft: #475569;
            --border: #E5E7EB; --radius: 12px; --font: 'Plus Jakarta Sans', sans-serif;
        }
        body { background: var(--bg); color: var(--ink); font-family: var(--font); margin: 0; overflow-x: hidden; }
        .page-section { display: none; min-height: 100vh; padding: 40px 20px; box-sizing: border-box; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--surface); max-width: 600px; margin: 0 auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .btn { width: 100%; padding: 16px; font-size: 1.1rem; font-weight: 600; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; background: var(--primary); color: white; }
        .btn:disabled { background: #CBD5E1; cursor: not-allowed; }
        .input { width: 100%; padding: 16px; font-size: 1rem; border-radius: 12px; border: 2px solid var(--border); margin-bottom: 20px; box-sizing: border-box; }
        .likert-btn { width: 100%; padding: 16px; text-align: left; background: white; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .likert-btn.selected { border-color: var(--primary); background: var(--primary-light); font-weight: 600; }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        .result-header { background: var(--primary); color: white; padding: 40px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <section id="start-page" class="page-section active">
        <div class="card" style="text-align: center;">
            <h1 style="font-weight: 800;">Holland Code</h1>
            <p style="color: var(--ink-soft); margin-bottom: 30px;">Find the career path that fits your personality.</p>
            <input type="text" id="nameInput" class="input" placeholder="Enter your name" />
            <button id="startBtn" class="btn" onclick="startTest()">Start Assessment →</button>
        </div>
    </section>

    <section id="quiz-page" class="page-section">
        <div class="card">
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 10px; font-weight: 600;">
                <span id="qCount">Question 1 / 12</span>
                <span id="userNameDisplay"></span>
            </div>
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <h2 id="qText" style="margin-bottom: 30px;">Loading...</h2>
            <div id="likertContainer"></div>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button class="btn" style="background: #eee; color: #333; flex: 1;" onclick="goBack()">Back</button>
                <button id="nextBtn" class="btn" style="flex: 2;" onclick="goNext()" disabled>Next →</button>
            </div>
        </div>
    </section>

    <section id="result-page" class="page-section">
        <div style="max-width: 600px; margin: 0 auto;">
            <div class="result-header">
                <p style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 10px;">Your Holland Type</p>
                <h1 id="resType" style="margin: 0; font-size: 2.5rem;">Result</h1>
            </div>
            <div class="card">
                <h3>Recommended Careers</h3>
                <p id="resCareers" style="color: var(--ink-soft); margin-top: 10px;"></p>
                <h3 style="margin-top: 20px;">Growth Tips</h3>
                <ul id="resGrowth" style="margin-top: 10px; padding-left: 20px;"></ul>
                <button class="btn" style="margin-top: 30px;" onclick="location.reload()">Restart Test</button>
            </div>
        </div>
    </section>

    <script>
        const questions = [
            { text: "I like to work with animals, tools, or machines.", type: "R" },
            { text: "I enjoy solving math or science problems.", type: "I" },
            { text: "I like to do creative activities like art or music.", type: "A" },
            { text: "I enjoy helping people and teaching them.", type: "S" },
            { text: "I like to lead people and make decisions.", type: "E" },
            { text: "I like to work with numbers and keep records.", type: "C" },
            { text: "I prefer working outdoors.", type: "R" },
            { text: "I am curious about how things work.", type: "I" },
            { text: "I like to express ideas through writing.", type: "A" },
            { text: "I enjoy volunteering for my community.", type: "S" },
            { text: "I enjoy persuading others or selling things.", type: "E" },
            { text: "I am a very organized and detail-oriented person.", type: "C" }
        ];

        const typeInfo = {
            R: { name: "Realistic", careers: "Engineer, Pilot, Chef", growth: ["Develop social skills", "Practice emotional expression"] },
            I: { name: "Investigative", careers: "Scientist, Doctor, Developer", growth: ["Focus on practical action", "Improve teamwork"] },
            A: { name: "Artistic", careers: "Designer, Writer, Architect", growth: ["Set structured plans", "Follow organizational rules"] },
            S: { name: "Social", careers: "Teacher, Counselor, Nurse", growth: ["Set personal boundaries", "Learn technical skills"] },
            E: { name: "Enterprising", careers: "Manager, Lawyer, Entrepreneur", growth: ["Practice active listening", "Focus on details"] },
            C: { name: "Conventional", careers: "Accountant, Banker, Analyst", growth: ["Be open to changes", "Try creative approaches"] }
        };

        let current = 0;
        let name = "";
        let answers = new Array(questions.length).fill(null);

        function startTest() {
            name = document.getElementById('nameInput').value.trim();
            if (name.length < 2) return alert("Please enter your name.");
            document.getElementById('userNameDisplay').textContent = name;
            document.getElementById('start-page').classList.remove('active');
            document.getElementById('quiz-page').classList.add('active');
            render();
        }

        function render() {
            document.getElementById('qText').textContent = questions[current].text;
            document.getElementById('qCount').textContent = `Question ${current + 1} / ${questions.length}`;
            document.getElementById('progressFill').style.width = `${((current + 1) / questions.length) * 100}%`;
            
            const container = document.getElementById('likertContainer');
            const opts = ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"];
            container.innerHTML = opts.map((o, i) => `
                <button class="likert-btn ${answers[current] === (i+1) ? 'selected' : ''}" onclick="select(${i+1})">${o}</button>
            `).join('');
            document.getElementById('nextBtn').disabled = answers[current] === null;
        }

        function select(v) { answers[current] = v; render(); }
        function goNext() { if (current < questions.length - 1) { current++; render(); } else { showResult(); } }
        function goBack() { if (current > 0) { current--; render(); } }

        function showResult() {
            const scores = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
            questions.forEach((q, i) => scores[q.type] += answers[i]);
            const top = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            document.getElementById('resType').textContent = typeInfo[top].name;
            document.getElementById('resCareers').textContent = typeInfo[top].careers;
            document.getElementById('resGrowth').innerHTML = typeInfo[top].growth.map(g => `<li>${g}</li>`).join('');
            
            document.getElementById('quiz-page').classList.remove('active');
            document.getElementById('result-page').classList.add('active');
        }
    </script>
</body>
</html>
